version: "3.9"

# ArtiShield — full monitoring stack
#
# Usage:
#   docker compose up -d
#   open http://localhost:7878   (ArtiShield dashboard)
#   open http://localhost:3000   (Grafana)
#   open http://localhost:9090   (Prometheus)

services:

  # ── arti (Tor client) ──────────────────────────────────────────────────────
  # Note: there is no official Docker image for arti.
  # Build it yourself or install on the host and use host networking.
  # Uncomment the block below once you have a local arti image:
  #
  # arti:
  #   image: local/arti:latest
  #   container_name: arti
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:9150:9150"
  #   volumes:
  #     - arti-data:/var/lib/arti
  #   healthcheck:
  #     test: ["CMD", "nc", "-z", "localhost", "9150"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 6
  #     start_period: 30s

  # ── ArtiShield ─────────────────────────────────────────────────────────────
  artishield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artishield
    restart: unless-stopped
    ports:
      - "7878:7878"
    volumes:
      - artishield-data:/var/lib/artishield
      - ./artishield.toml:/opt/artishield/artishield.toml:ro
      # Optional: MaxMind GeoLite2-ASN (download from maxmind.com)
      # - ./GeoLite2-ASN.mmdb:/opt/artishield/GeoLite2-ASN.mmdb:ro
    environment:
      RUST_LOG: "artishield=info,warn"
      RUST_MIN_STACK: "67108864"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7878/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      artishield:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "artishield"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ""
    depends_on:
      - prometheus

volumes:
  artishield-data:
  prometheus-data:
  grafana-data:
  # arti-data:    # uncomment when using the arti container

networks:
  default:
    name: artishield-net
