<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bevy Earth + Artishield (WASM)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body, #container, canvas { height: 100%; margin: 0; padding: 0; }
      canvas { width: 100%; height: 100%; display: block; }
    </style>
  </head>
  <body>
    <div id="container">
      <!-- Trunk will replace with wasm bundle and canvas -->
    </div>
    <script type="module">
      import init from "./pkg/your_crate.js";
      import { requestFullScreenCanvas } from "./static/fullscreen.js";
      init().then(() => {
        // optional: expose toggle to global scope
        window.requestFullScreenCanvas = requestFullScreenCanvas;
      });
    </script>
  </body>
</html>
