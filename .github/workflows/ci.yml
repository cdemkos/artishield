name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Default features (geoip, no bevy, no arti) ────────────────────────────
  check-default:
    name: check (default)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-default-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo test
        run: cargo test --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── No-default-features (minimal, no geoip) ────────────────────────────────
  check-minimal:
    name: check (no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-minimal-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --no-default-features

  # ── bevy-plugin only (render node, no window) ─────────────────────────────
  check-bevy-plugin:
    name: check (bevy-plugin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
      - name: Install X11/audio dev libs (needed by bevy_winit in bevy-plugin)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libudev-dev libasound2-dev
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bevy-plugin-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --features bevy-plugin

  # ── bevy-ui (full native app — compile-check only, no display needed) ─────
  check-bevy-ui:
    name: check (bevy-ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
      - name: Install X11/audio dev libs
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev \
            libudev-dev libasound2-dev
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bevy-ui-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo check --features bevy-ui

  # ── Format ────────────────────────────────────────────────────────────────
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.77"
          components: rustfmt
      - run: cargo fmt --check
