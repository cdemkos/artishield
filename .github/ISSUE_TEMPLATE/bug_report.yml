name: Bug Report
description: File a bug report
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: version
    attributes:
      label: ArtiShield version
      placeholder: "e.g. 0.2.1"
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      placeholder: "rustc --version output"
    validations:
      required: true
  - type: dropdown
    id: features
    attributes:
      label: Feature flags
      multiple: true
      options:
        - default (geoip)
        - arti-hooks
        - bevy-plugin
        - bevy-ui
        - no-default-features
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cargo run`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste logs here (RUST_LOG=artishield=debug)
      render: shell
