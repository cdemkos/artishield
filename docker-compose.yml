# ArtiShield — full monitoring stack
#
# Quick start:
#   cp .env.example .env          # set GRAFANA_ADMIN_PASSWORD
#   docker compose up -d
#
# Custom config (optional):
#   cp artishield.toml.example artishield.toml
#   nano artishield.toml
#   # then uncomment the artishield.toml volume mount below
#
# Services:
#   ArtiShield dashboard  →  http://localhost:7878
#   Prometheus            →  http://localhost:9090
#   Grafana               →  http://localhost:3000

services:

  # ── arti (Tor client) ──────────────────────────────────────────────────────
  # There is no official Docker image for arti.
  # Option A: Install arti on the host and use network_mode: host (Linux only).
  # Option B: Build a local image and uncomment the block below.
  #
  # arti:
  #   image: local/arti:latest
  #   container_name: arti
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:9150:9150"
  #   volumes:
  #     - arti-data:/var/lib/arti
  #   healthcheck:
  #     test: ["CMD", "nc", "-z", "localhost", "9150"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 6
  #     start_period: 30s

  # ── ArtiShield ─────────────────────────────────────────────────────────────
  artishield:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artishield
    restart: unless-stopped
    ports:
      - "127.0.0.1:7878:7878"
    volumes:
      - artishield-data:/var/lib/artishield
      # Optional: override the default config baked into the image.
      # Create artishield.toml first: cp artishield.toml.example artishield.toml
      # - ./artishield.toml:/opt/artishield/artishield.toml:ro
      #
      # Optional: MaxMind GeoLite2-ASN database (download from maxmind.com)
      # - ./GeoLite2-ASN.mmdb:/opt/artishield/GeoLite2-ASN.mmdb:ro
    environment:
      RUST_LOG: "artishield=info,warn"
      RUST_MIN_STACK: "67108864"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7878/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      artishield:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      # Set GRAFANA_ADMIN_PASSWORD in .env — never use the default in production.
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: ""
    depends_on:
      - prometheus

volumes:
  artishield-data:
  prometheus-data:
  grafana-data:
  # arti-data:    # uncomment when using the arti container

networks:
  default:
    name: artishield-net
